# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf.

$activeBorderColor = rgba(555555ee) rgba(55555500) 90deg
$inactiveBorderColor = rgba(000000ee)

general {
    col.active_border = $activeBorderColor
    col.inactive_border = $inactiveBorderColor
    gaps_in = 4
    gaps_out = 5
    border_size = 2
}

group {
    col.border_active = $activeBorderColor
    col.border_inactive = $inactiveBorderColor
}

group {
    col.border_active = $activeBorderColor
}

decoration {
    rounding = 3
    rounding_power = 3
      shadow {
      enabled = yes
      range = 16
      color = rgba(00000052)
    }
}

animations {
    enabled = yes

    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    bezier = softSnap, 0.2, 0.8, 0.2, 1

    animation = windows, 1, 3, easeOutExpo, popin 80%
    animation = windowsOut, 1, 3, easeOutExpo, popin 80%
    
    animation = fadeIn, 1, 2, softSnap
    animation = fadeOut, 1, 2, softSnap
    
    animation = workspaces, 1, 4, softSnap, slide
    
    animation = layers, 1, 3, softSnap, fade
}